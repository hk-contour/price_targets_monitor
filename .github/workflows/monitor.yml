name: Price Target Monitor

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10:00 AM ET (14:00 UTC) weekdays
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price check
        run: python monitor.py

      - name: Save alert log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts_sent.json || true
          git diff --staged --quiet || git commit -m "chore: update alerts_sent.json [skip ci]"
          git push
